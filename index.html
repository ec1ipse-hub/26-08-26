<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>26|08|26</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffe9e0;  
            min-height: 100vh;
            display: flex;
            align-items: center;    
            justify-content: center; 
            padding: 16px;           
        }


        .image-container {
            max-width: 1200px;   
            width: 100%;              
            display: flex;
            justify-content: center;  
        }


        .responsive-image {
            max-width: 100%;          
            height: auto;             
            display: block;           
            border-radius: 24px;      
            transition: all 0.2s ease;
        }


        @media (max-width: 480px) {
            body {
                padding: 8px;          
            }
            .responsive-image {
                border-radius: 18px;   
            }
        }

 

        @media (min-width: 1600px) {
            .image-container {
                max-width: 1400px;      
            }
        }


    </style>
</head>
<body>
    <div class="image-container">

        <img src="img/Frame 78.svg" alt="Приглашение Андрей и Светлана" class="responsive-image">
    </div>

</body>
</html>
